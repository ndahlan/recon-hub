<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recon — Email Confirmed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a3a2a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #1a3a2a;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: block;
      background: #1a3a2a;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 12px;
      margin-bottom: 16px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .hint {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .status {
      font-size: 13px;
      color: #16A34A;
      font-weight: 600;
      margin-bottom: 20px;
      background: #F0FDF4;
      border-radius: 8px;
      padding: 10px 16px;
      display: none;
    }
    .status.show { display: block; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #16A34A;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Email Confirmed!</h1>
    <p class="subtitle">
      Your Recon account has been verified.<br/>
      Tap the button below to open the app and sign in.
    </p>

    <div class="status" id="status">
      <span class="spinner"></span>Opening Recon…
    </div>

    <a href="recon://" id="openBtn" class="btn">
      Open Recon App
    </a>

    <p class="hint">
      If the button doesn't work, open Recon on your device and sign in with your email and password.
    </p>
  </div>

  <script>
    // Read tokens from the URL fragment (Supabase puts them in the hash)
    const raw    = window.location.hash.replace(/^#/, '');
    const qraw   = window.location.search.replace(/^\?/, '');
    const params = new URLSearchParams(raw || qraw);

    const access_token  = params.get('access_token');
    const refresh_token = params.get('refresh_token') || '';
    const type          = params.get('type') || 'signup';

    const btn = document.getElementById('openBtn');
    const statusEl = document.getElementById('status');

    if (access_token) {
      // Build deep link with tokens so the app logs in immediately
      const deepLink =
        'recon://#access_token=' + encodeURIComponent(access_token) +
        '&refresh_token='  + encodeURIComponent(refresh_token) +
        '&type='           + encodeURIComponent(type);

      btn.href = deepLink;

      // Auto-attempt on mobile after a short delay
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
      if (isMobile) {
        statusEl.classList.add('show');
        setTimeout(() => {
          window.location.href = deepLink;
        }, 1200);
      }
    }
  </script>
</body>
</html>
